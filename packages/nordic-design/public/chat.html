<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Nordic Design Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Inter', sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      }
      .nordic-blue { color: #1e3a8a; }
      .nordic-accent { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
      .nordic-accent:hover { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
      .nordic-green { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
      .nordic-green:hover { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
      .nordic-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        border: 1px solid rgba(0,0,0,0.05);
      }
      .nordic-input {
        background: #f8fafc;
        border: 2px solid #e2e8f0;
      }
      .nordic-input:focus {
        background: white;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }
      /* Mobile viewport fixes */
      @media (max-width: 640px) {
        .nordic-card {
          padding: 12px;
        }
        #chatMessages {
          padding: 12px;
        }
      }
      /* Chat message bubbles */
      .chat-bubble-user {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
      }
      .chat-bubble-bot {
        background: #f8fafc;
        color: #2c3e50;
        border-bottom-left-radius: 4px;
        border: 1px solid #e2e8f0;
      }
      /* Edit link styles */
      .edit-corpus-link {
        color: #64748b;
        text-decoration: none;
        font-size: 0.75rem;
        display: inline-flex items-center gap-1;
      }
      .edit-corpus-link:hover {
        color: #2563eb;
        text-decoration: underline;
      }
      .edit-corpus-link svg {
        width: 12px;
        height: 12px;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="nordic-card border-b border-gray-200 px-4 py-3 sticky top-0 z-10 flex-shrink-0">
      <div class="max-w-5xl mx-auto flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <a href="/" class="nordic-gray hover:text-blue-600 transition flex-shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
          </a>
          <div class="flex-1 min-w-0">
            <h2 class="text-lg font-bold nordic-blue flex items-center gap-2">
              <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
              </svg>
              <span id="chatTitle" class="truncate">Professor</span>
            </h2>
            <p class="nordic-gray text-xs truncate">Nordic Design Professor</p>
          </div>
        </div>
        <a href="/professors.html" id="editCorpusLink" class="edit-corpus-link flex-shrink-0">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
          Edit Corpus
        </a>
      </div>
    </header>
    
    <!-- Chat Container -->
    <div class="flex-1 max-w-5xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-4 flex flex-col overflow-hidden flex-shrink-0">
      <!-- Professor Header -->
      <div class="nordic-card p-4 sm:p-6 mb-4 sm:mb-6 flex items-center gap-4 sm:gap-6 flex-shrink-0">
        <div class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden flex-shrink-0 shadow-lg">
          <img id="professorImage" src="/images/default.jpg" alt="Professor" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <h1 id="professorName" class="text-xl sm:text-2xl md:text-3xl font-bold nordic-blue truncate">Professor Name</h1>
          <p id="professorField" class="text-sm sm:text-base md:text-lg text-gray-600 mt-1 truncate">Field of Expertise</p>
        </div>
      </div>
      
      <!-- Chat Messages (scrollable) -->
      <div id="chatMessages" class="nordic-card flex-1 min-h-0 p-4 sm:p-6 mb-4 sm:mb-6 overflow-y-auto flex flex-col">
        <div class="flex-1 flex flex-col items-center justify-center py-12 sm:py-16">
          <div class="w-20 h-20 sm:w-24 sm:h-24 bg-blue-50 rounded-full flex items-center justify-center mb-4 sm:mb-6">
            <svg class="w-10 h-10 sm:w-12 sm:h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
          </div>
          <p class="text-gray-500 text-sm sm:text-base">Start a conversation with your Nordic design professor</p>
        </div>
      </div>
      
      <!-- Chat Input -->
      <div class="nordic-card p-3 sm:p-4 flex-shrink-0">
        <form id="chatForm" class="flex gap-2 sm:gap-3 items-center">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="Type your message..." 
            autocomplete="off"
            class="flex-1 nordic-input px-3 sm:px-5 py-3 sm:py-4 rounded-xl transition text-base sm:text-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent min-w-0"
          >
          <button type="submit" id="sendButton" class="nordic-accent text-white px-4 sm:px-6 md:px-8 py-3 sm:py-4 rounded-xl font-semibold text-base sm:text-lg transition shadow-lg hover:shadow-xl flex-shrink-0 min-w-[60px] sm:min-w-auto flex items-center justify-center">
            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
            </svg>
          </button>
        </form>
      </div>
    </div>
    
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const professorId = urlParams.get('id') || window.location.pathname.split('/').pop();
      let context = {};
      
      async function loadProfessor() {
        try {
          const response = await fetch(`/api/professors/${professorId}`);
          const data = await response.json();
          
          document.getElementById('chatTitle').textContent = data.name;
          document.getElementById('professorName').textContent = data.name;
          document.getElementById('professorField').textContent = data.field;
          
          if (data.image) {
            document.getElementById('professorImage').src = data.image;
          }
          
          // Set edit link
          document.getElementById('editCorpusLink').href = `/professors.html?id=${professorId}`;
        } catch (err) {
          console.error('Failed to load professor:', err);
        }
      }
      
      function onChatMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        addMessage(message, 'user');
        input.value = '';
        input.disabled = true;

        sendMessage(message);
      }

      async function sendMessage(message) {
        
        const input = document.getElementById('messageInput');
        
        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ professorId, message, context })
          });
          
          const data = await response.json();
          
          if (response.ok && data) {
            context = data.context;
            addMessage(data.answer, 'bot');
          } else {
            addMessage('Sorry, I encountered an error processing your message.', 'bot');
          }
        } catch (err) {
          console.error('Failed to send message:', err);
          addMessage('Sorry, I encountered an error processing your message.', 'bot');
        } finally {
          input.disabled = false;
          input.focus();
          scrollToBottom();
        }
      }
      
      function addMessage(text, sender) {
        const messagesDiv = document.getElementById('chatMessages');
        
        // Clear placeholder if it's the first message
        if (messagesDiv.querySelector('.flex.items-center.justify-center')) {
          messagesDiv.innerHTML = '';
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `max-w-[85%] px-6 py-4 rounded-2xl chat-bubble-${sender} mb-4 ${
          sender === 'user' ? 'ml-auto' : 'mr-auto'
        }`;
        messageDiv.textContent = text;
        messagesDiv.appendChild(messageDiv);
        scrollToBottom();
      }
      
      function scrollToBottom() {
        const messagesDiv = document.getElementById('chatMessages');
        if (messagesDiv) {
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      }
      
      document.getElementById('sendButton').addEventListener('click', onChatMessage);
      
      document.getElementById('chatForm').addEventListener('submit', (e) => {
        e.preventDefault();
        onChatMessage();
      });
      
      (async () => {
        await loadProfessor();
        sendMessage('Hi');
      })();
      
      // Handle keyboard resize on mobile
      function adjustForKeyboard() {
        const input = document.getElementById('messageInput');
        const messagesDiv = document.getElementById('chatMessages');
        
        if (!input || !messagesDiv) return;
        
        // When input is focused, adjust messages container height
        const isFocused = document.activeElement === input;
        
        if (isFocused) {
          // Account for keyboard height (estimate 300-400px on mobile)
          const viewportHeight = window.innerHeight;
          const headerHeight = document.querySelector('header')?.offsetHeight || 80;
          const professorHeight = document.querySelector('.nordic-card.p-4')?.offsetHeight || 100;
          const inputHeight = document.querySelector('.nordic-card.p-3')?.offsetHeight || 70;
          
          // Calculate remaining space
          const remainingHeight = viewportHeight - headerHeight - professorHeight - inputHeight - 30;
          messagesDiv.style.maxHeight = remainingHeight + 'px';
        } else {
          messagesDiv.style.maxHeight = 'none';
        }
      }
      
      // Listen for keyboard events
      const messageInput = document.getElementById('messageInput');
      messageInput?.addEventListener('focus', adjustForKeyboard);
      messageInput?.addEventListener('blur', adjustForKeyboard);
      window.addEventListener('resize', adjustForKeyboard);
      
      // Also ensure messages area scrolls correctly when keyboard appears
      let lastScrollTop = 0;
      const messagesDiv = document.getElementById('chatMessages');
      messagesDiv?.addEventListener('scroll', () => {
        lastScrollTop = messagesDiv.scrollTop;
      });
      
      // Initial adjustment
      adjustForKeyboard();
    </script>
  </body>
</html>
