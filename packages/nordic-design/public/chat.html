<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Nordic Design Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-styles@1.0.0/simple-styles.min.css">
    <style>
      body { padding: 0; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      header { background: #2c3e50; color: white; padding: 15px 20px; }
      .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; }
      .chat-header { background: white; padding: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #ddd; }
      .chat-header img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
      .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; display: flex; flex-direction: column; gap: 15px; }
      .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; }
      .message.user { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 4px; }
      .message.bot { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .chat-input-area { background: white; padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
      #messageInput { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; font-size: 16px; outline: none; }
      #sendButton { background: #3498db; color: white; padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: 600; }
      .btn-secondary { background: #95a5a6; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
    </style>
  </head>
  <body>
    <header>
      <h2 style="margin: 0; display: inline-block;">Chat with <span id="chatTitle">Professor</span></h2>
      <a href="/" class="btn-secondary" style="margin-left: 20px;">Back to Home</a>
    </header>
    
    <div class="chat-container">
      <div class="chat-header">
        <img id="professorImage" src="/images/default-professor.jpg" alt="Professor">
        <div>
          <h2 style="margin: 0; color: #2c3e50;" id="professorName">Professor Name</h2>
          <p style="margin: 5px 0 0 0; color: #7f8c8d;" id="professorField">Field</p>
        </div>
      </div>
      
      <div id="chatMessages" class="chat-messages">
        <div class="message bot">Hello! I'm a Nordic design professor. Ask me anything about my field!</div>
      </div>
      
      <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendButton">Send</button>
      </div>
    </div>
    
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const professorId = urlParams.get('id') || window.location.pathname.split('/').pop();
      
      async function loadProfessor() {
        try {
          const response = await fetch(`/api/professors/${professorId}`);
          const data = await response.json();
          
          document.getElementById('chatTitle').textContent = data.name;
          document.getElementById('professorName').textContent = data.name;
          document.getElementById('professorField').textContent = data.field;
          
          if (data.image) {
            document.getElementById('professorImage').src = data.image;
          }
        } catch (err) {
          console.error('Failed to load professor:', err);
        }
      }
      
      async function sendMessage() {
        const input = document.getElementById('messageInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        addMessage(message, 'user');
        input.value = '';
        input.disabled = true;
        
        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ professorId, message })
          });
          
          const data = await response.json();
          
          if (response.ok && data) {
            const botMessage = data.response || data;
            addMessage(botMessage, 'bot');
          } else {
            addMessage('Sorry, I encountered an error processing your message.', 'bot');
          }
        } catch (err) {
          console.error('Failed to send message:', err);
          addMessage('Sorry, I encountered an error processing your message.', 'bot');
        } finally {
          input.disabled = false;
          input.focus();
        }
      }
      
      function addMessage(text, sender) {
        const messagesDiv = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.textContent = text;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
      
      document.getElementById('sendButton').addEventListener('click', sendMessage);
      
      document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      
      loadProfessor();
    </script>
  </body>
</html>
