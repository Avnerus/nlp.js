<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Professor - Nordic Design Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-styles@1.0.0/simple-styles.min.css">
    <style>
      body { padding: 20px; background: #f5f5f5; }
      .container { max-width: 1200px; margin: 0 auto; }
      .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      .info { background: #e8f4f8; padding: 15px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid #3498db; }
      #corpusEditor { width: 100%; height: 500px; font-family: monospace; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: #fafafa; }
      .btn-group { display: flex; gap: 10px; margin-top: 20px; }
      .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
      .btn-primary { background: #3498db; color: white; }
      .btn-success { background: #27ae60; color: white; }
      .btn-secondary { background: #95a5a6; color: white; }
      .btn:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2 id="professorName" style="margin: 0;">Edit Professor</h2>
          <div class="btn-group">
            <a href="/" class="btn btn-secondary">Back to Home</a>
            <a href="/chat.html" id="testChatBtn" class="btn btn-primary">Test Chatbot</a>
          </div>
        </div>
        <div class="info">
          <p><strong>ID:</strong> <span id="professorId"></span></p>
          <p><strong>Field:</strong> <span id="professorField"></span></p>
          <p><strong>Created:</strong> <span id="professorCreated"></span></p>
        </div>
        
        <form id="corpusForm">
          <label for="corpusEditor">Corpus JSON</label>
          <textarea id="corpusEditor" name="corpus"></textarea>
          <div class="btn-group">
            <button type="submit" class="btn btn-success">Save Corpus</button>
          </div>
        </form>
      </div>
    </div>
    
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const professorId = urlParams.get('id') || window.location.pathname.split('/').pop();
      
      async function loadProfessor() {
        try {
          const response = await fetch(`/api/professors/${professorId}`);
          const data = await response.json();
          
          document.getElementById('professorName').textContent = `Edit: ${data.name}`;
          document.getElementById('professorId').textContent = data.id;
          document.getElementById('professorField').textContent = data.field;
          document.getElementById('professorCreated').textContent = new Date(data.createdAt).toLocaleString();
          
          if (data.corpus) {
            document.getElementById('corpusEditor').value = JSON.stringify(data.corpus, null, 2);
          } else {
            document.getElementById('corpusEditor').value = '{}';
          }
          
          document.getElementById('testChatBtn').href = `/chat.html?id=${professorId}`;
        } catch (err) {
          console.error('Failed to load professor:', err);
          alert('Failed to load professor data');
        }
      }
      
      document.getElementById('corpusForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const corpusText = document.getElementById('corpusEditor').value;
        
        try {
          const corpus = JSON.parse(corpusText);
          
          const response = await fetch(`/api/professors/${professorId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ corpus })
          });
          
          if (response.ok) {
            alert('Corpus saved successfully!');
          } else {
            const err = await response.json();
            alert(`Error: ${err.error}`);
          }
        } catch (err) {
          alert('Invalid JSON in corpus editor');
        }
      });
      
      loadProfessor();
    </script>
  </body>
</html>
